<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WordPath — İngilis Sözləri</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- ── HEADER ────────────────────────────── -->
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </div>
          <span class="logo-text">WordPath</span>
        </div>
        <!-- Ulduz sayğacı (şans üçün gem sistemi) -->
        <div class="stat-badge">
          <svg viewBox="0 0 24 24" stroke-width="2">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
          <span id="star-count">0</span>
        </div>
      </div>
    </header>

    <!-- ── LEVEL LIST ─────────────────────────── -->
    <main class="main-content">
      <p class="page-subtitle">Öyrənmək istədiyin səviyyəni seç</p>
      <div class="level-list" id="level-list">
        <!-- Rendered by app.js -->
      </div>
    </main>

  </div>

  <!-- ═══════════════════════════════════════════
       QUIZ SCREEN (full-screen overlay)
  ═══════════════════════════════════════════ -->
  <div id="quiz-screen" class="screen-overlay hidden">

    <div class="quiz-header">
      <button class="icon-btn" id="quit-btn" aria-label="Çıx">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
             stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="progress-bar-wrap">
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>
      <span class="q-counter" id="q-counter">1/20</span>
    </div>

    <div class="quiz-body">
      <div class="question-card">
        <p class="question-hint">Düzgün tərcüməni tap</p>
        <h1 class="question-word" id="question-word">Apple</h1>
      </div>
      <div class="options-grid" id="options-grid">
        <button class="option-btn" id="opt-0" data-index="0"></button>
        <button class="option-btn" id="opt-1" data-index="1"></button>
      </div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       RESULT SCREEN (full-screen overlay)
  ═══════════════════════════════════════════ -->
  <div id="result-screen" class="screen-overlay hidden">
    <div class="result-body">
      <div class="result-emoji" id="result-emoji">🎉</div>
      <h2  class="result-title" id="result-title">Əla!</h2>
      <p   class="result-desc"  id="result-desc"></p>
      <div class="result-actions">
        <button class="btn-primary"            id="result-main-btn">Davam et</button>
        <button class="btn-secondary hidden"   id="result-back-btn">Ana səhifəyə qayıt</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       CHANCE MODAL (bottom sheet)
       Səhv etdikdə çıxır — 1 ulduz qarşılığında şans
  ═══════════════════════════════════════════ -->
  <div id="chance-modal" class="chance-backdrop hidden">
    <div class="chance-sheet">
      <div class="chance-handle"></div>
      <div class="chance-icon">🎯</div>
      <h3 class="chance-title">Bir şansın var!</h3>
      <p class="chance-desc">
        1 ulduz xərcləyərək bu sualı yenidən cavablandır.<br>
        Hər testdə yalnız <strong>1 dəfə</strong> istifadə oluna bilər.
      </p>
      <div class="chance-cost">
        <svg viewBox="0 0 24 24" stroke-width="2">
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
        </svg>
        <span>1 ulduz — mövcud: <span id="chance-stars">0</span></span>
      </div>
      <div class="chance-actions">
        <button class="btn-chance-accept" id="chance-accept">
          ⭐ 1 ulduz xərclə, yenidən cəhd et
        </button>
        <button class="btn-chance-decline" id="chance-decline">
          Xeyr, keç
        </button>
      </div>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
