<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WordPath — Statistika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="stats.css">
</head>
<body>
  <div id="app">

    <!-- ── HEADER ── -->
    <header class="app-header">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
              <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </svg>
          </div>
          <span class="logo-text">WordPath</span>
        </div>

        <div class="header-actions">
          <!-- Geri qayıt -->
          <button class="header-action-btn back-btn" id="back-btn" title="Geri">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5"/>
              <path d="M12 19l-7-7 7-7"/>
            </svg>
          </button>

          <!-- Ulduz sayğacı -->
          <div class="stat-badge">
            <svg viewBox="0 0 24 24" stroke-width="2">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
            </svg>
            <span id="star-count">0</span>
          </div>
        </div>
      </div>
    </header>

    <!-- ── MAIN ── -->
    <main class="main-content stats-main">

      <!-- Page title + streak -->
      <div class="stats-topbar">
        <span class="stats-page-title">Statistika</span>
        <div class="streak-pill">
          <span class="streak-flame">🔥</span>
          <span id="streak-val">0</span>
          <span class="streak-label">günlük ardıcıllıq</span>
        </div>
      </div>

      <!-- Star info bar -->
      <div class="stats-card star-info-bar" id="star-info-bar">
        <span class="star-info-icon">⭐</span>
        <div class="star-info-text">
          <span class="star-info-count" id="star-info-count">0 ulduz mövcuddur</span>
          <span class="star-info-fixed" id="star-info-fixed">· 0 səhv ulduzla düzəldildi</span>
        </div>
        <div class="star-info-note">Düzəldilsə də səhv qeydə alınır</div>
      </div>

      <!-- Metric cards -->
      <div class="metric-grid">
        <div class="stats-card metric-card">
          <div class="metric-val" id="metric-learned">0</div>
          <div class="metric-lbl">Öyrənilmiş söz</div>
          <div class="metric-sub green" id="metric-weekly"></div>
        </div>
        <div class="stats-card metric-card">
          <div class="metric-val" id="metric-correct">0%</div>
          <div class="metric-lbl">Düzgün cavab</div>
          <div class="metric-sub green" id="metric-rate-change"></div>
        </div>
        <div class="stats-card metric-card">
          <div class="metric-val" id="metric-errors">0</div>
          <div class="metric-lbl">Ümumi səhv sayı</div>
          <div class="metric-sub amber" id="metric-star-fixed"></div>
        </div>
        <div class="stats-card metric-card">
          <div class="metric-val" id="metric-avg">0 dəq</div>
          <div class="metric-lbl">Ortalama/gün</div>
        </div>
      </div>

      <!-- Level progress -->
      <div class="stats-card level-progress-card">
        <div class="section-label">Səviyyə üzrə irəliləmə</div>
        <div id="level-progress-list"></div>
      </div>

      <!-- Error analysis -->
      <div class="error-section">
        <div class="section-label">Səhv analizi</div>
        <div id="error-groups"></div>
        <div class="no-errors hidden" id="no-errors">
          <div class="no-errors-emoji">🎉</div>
          <div class="no-errors-title">Heç bir səhv yoxdur!</div>
        </div>
      </div>

    </main>
  </div>

  <script src="data.js"></script>
  <script src="stats.js"></script>
</body>
</html>
